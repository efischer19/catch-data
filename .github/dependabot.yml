version: 2
updates:
  # Monitor GitHub Actions for version updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - "*"

  # Monitor pip dependencies for catch-ingestion
  - package-ecosystem: "pip"
    directory: "/apps/catch-ingestion"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Monitor pip dependencies for catch-processing
  - package-ecosystem: "pip"
    directory: "/apps/catch-processing"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Monitor pip dependencies for catch-analytics
  - package-ecosystem: "pip"
    directory: "/apps/catch-analytics"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Monitor pip dependencies for catch-models
  - package-ecosystem: "pip"
    directory: "/libs/catch-models"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
