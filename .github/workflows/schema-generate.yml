name: Generate Gold Schema

on:
  push:
    branches: [main]
    paths:
      - "libs/catch-models/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-schema:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      schema_changed: ${{ steps.schema-diff.outputs.changed }}
      source_sha: ${{ steps.source-context.outputs.source_sha }}
      source_ref: ${{ steps.source-context.outputs.source_ref }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python and Poetry
        uses: ./.github/actions/setup-python-poetry
        with:
          working-directory: libs/catch-models

      - name: Generate schema.json from Gold models
        working-directory: libs/catch-models
        run: poetry run python -m catch_models.schema

      - name: Validate generated schema against the JSON Schema meta-schema
        working-directory: libs/catch-models
        run: |
          poetry run python - <<'PY'
          import json
          from pathlib import Path

          from jsonschema.validators import validator_for

          schema = json.loads(Path("schema.json").read_text(encoding="utf-8"))
          validator_for(schema).check_schema(schema)
          print("✅ schema.json is valid JSON Schema")
          PY

      - name: Check for schema drift
        id: schema-diff
        run: |
          if git diff --quiet -- libs/catch-models/schema.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "✅ schema.json is already up to date"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️ schema.json changed after regeneration"
            git --no-pager diff -- libs/catch-models/schema.json
          fi

      - name: Commit updated schema.json
        if: steps.schema-diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add libs/catch-models/schema.json
          git commit -m "chore: regenerate schema.json from Gold models"
          git push

      - name: Capture schema source commit context
        id: source-context
        run: |
          echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "source_ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Exit cleanly when schema is unchanged
        if: steps.schema-diff.outputs.changed == 'false'
        run: echo "No schema changes detected; skipping commit and sync trigger."

  sync-schema:
    name: Sync schema to catch-app
    needs: generate-schema
    if: needs.generate-schema.outputs.schema_changed == 'true'
    uses: ./.github/workflows/schema-sync.yml
    with:
      schema-path: libs/catch-models/schema.json
      source-sha: ${{ needs.generate-schema.outputs.source_sha }}
      source-ref: ${{ needs.generate-schema.outputs.source_ref }}
    secrets:
      catch_app_sync_token: ${{ secrets.CATCH_APP_SYNC_TOKEN }}
