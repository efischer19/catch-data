name: Sync schema to catch-app

on:
  workflow_call:
    inputs:
      schema-path:
        description: Path to the generated schema.json in catch-data
        required: false
        type: string
        default: libs/catch-models/schema.json
      target-path:
        description: Destination path for schema.json inside catch-app
        required: false
        type: string
        default: src/schema/schema.json
      source-sha:
        description: Commit SHA in catch-data that produced the schema
        required: false
        type: string
      source-ref:
        description: Git ref in catch-data associated with the schema commit
        required: false
        type: string
    secrets:
      catch_app_sync_token:
        description: Fine-grained PAT or GitHub App token scoped to catch-app
        required: false
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-schema:
    runs-on: ubuntu-latest
    env:
      SYNC_TOKEN: ${{ secrets.catch_app_sync_token || secrets.CATCH_APP_SYNC_TOKEN }}
      TARGET_REPO_OVERRIDE: ${{ vars.CATCH_APP_REPO }}
    steps:
      - name: Resolve sync context
        id: context
        env:
          INPUT_SCHEMA_PATH: ${{ inputs.schema-path }}
          INPUT_TARGET_PATH: ${{ inputs.target-path }}
          INPUT_SOURCE_SHA: ${{ inputs.source-sha }}
          INPUT_SOURCE_REF: ${{ inputs.source-ref }}
        run: |
          schema_path="${INPUT_SCHEMA_PATH:-libs/catch-models/schema.json}"
          target_path="${INPUT_TARGET_PATH:-src/schema/schema.json}"
          source_sha="${INPUT_SOURCE_SHA:-${GITHUB_SHA}}"
          source_ref="${INPUT_SOURCE_REF:-${GITHUB_REF_NAME}}"
          target_repo="${TARGET_REPO_OVERRIDE:-${GITHUB_REPOSITORY_OWNER}/catch-app}"

          echo "schema_path=${schema_path}" >> "$GITHUB_OUTPUT"
          echo "target_path=${target_path}" >> "$GITHUB_OUTPUT"
          echo "source_sha=${source_sha}" >> "$GITHUB_OUTPUT"
          echo "source_ref=${source_ref}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${source_sha::7}" >> "$GITHUB_OUTPUT"
          echo "target_repo=${target_repo}" >> "$GITHUB_OUTPUT"

      - name: Validate sync token is configured
        id: auth
        run: |
          if [ -z "${SYNC_TOKEN}" ]; then
            echo "::notice::Skipping schema sync because no cross-repo token is configured. Configure CATCH_APP_SYNC_TOKEN (or reusable-workflow secret catch_app_sync_token) before enabling this automation."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Check catch-app repository and open sync PRs
        id: target
        if: steps.auth.outputs.ready == 'true'
        uses: actions/github-script@v8
        env:
          TARGET_REPO: ${{ steps.context.outputs.target_repo }}
          SHA_SHORT: ${{ steps.context.outputs.sha_short }}
        with:
          github-token: ${{ env.SYNC_TOKEN }}
          script: |
            const [owner, repo] = process.env.TARGET_REPO.split("/");

            try {
              const { data: repoData } = await github.rest.repos.get({ owner, repo });
              core.setOutput("exists", "true");
              core.setOutput("default_branch", repoData.default_branch);

              const pulls = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: "open",
                per_page: 100,
              });

              const existing = pulls.find((pull) => {
                return (
                  pull.head.ref.startsWith("schema-sync/") &&
                  pull.base.ref === repoData.default_branch
                );
              });

              core.setOutput(
                "branch_name",
                existing?.head.ref ?? `schema-sync/${process.env.SHA_SHORT}`,
              );
              core.setOutput(
                "pr_number",
                existing ? String(existing.number) : "",
              );
            } catch (error) {
              if (error.status === 404) {
                core.notice(`Skipping schema sync because ${process.env.TARGET_REPO} does not exist yet.`);
                core.setOutput("exists", "false");
                return;
              }

              throw error;
            }

      - name: Checkout catch-data at schema source commit
        if: steps.auth.outputs.ready == 'true' && steps.target.outputs.exists == 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.context.outputs.source_sha }}
          fetch-depth: 1

      - name: Checkout catch-app
        if: steps.auth.outputs.ready == 'true' && steps.target.outputs.exists == 'true'
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.context.outputs.target_repo }}
          token: ${{ env.SYNC_TOKEN }}
          ref: ${{ steps.target.outputs.default_branch }}
          path: catch-app
          fetch-depth: 0

      - name: Copy schema into catch-app branch
        id: sync
        if: steps.auth.outputs.ready == 'true' && steps.target.outputs.exists == 'true'
        env:
          BRANCH_NAME: ${{ steps.target.outputs.branch_name }}
          DEFAULT_BRANCH: ${{ steps.target.outputs.default_branch }}
          SCHEMA_PATH: ${{ steps.context.outputs.schema_path }}
          TARGET_PATH: ${{ steps.context.outputs.target_path }}
          SHA_SHORT: ${{ steps.context.outputs.sha_short }}
        run: |
          cd catch-app
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --quiet --exit-code --heads origin "${BRANCH_NAME}" >/dev/null; then
            git fetch origin "${BRANCH_NAME}"
            git checkout -B "${BRANCH_NAME}" "origin/${BRANCH_NAME}"
          else
            git checkout -B "${BRANCH_NAME}" "origin/${DEFAULT_BRANCH}"
          fi

          mkdir -p "$(dirname "${TARGET_PATH}")"
          cp "../${SCHEMA_PATH}" "${TARGET_PATH}"

          git add "${TARGET_PATH}"

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore(schema): sync schema.json from catch-data@${SHA_SHORT}"
          git push origin "${BRANCH_NAME}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create or update catch-app schema PR
        if: steps.auth.outputs.ready == 'true' && steps.target.outputs.exists == 'true' && (steps.sync.outputs.changed == 'true' || steps.target.outputs.pr_number != '')
        uses: actions/github-script@v8
        env:
          TARGET_REPO: ${{ steps.context.outputs.target_repo }}
          BRANCH_NAME: ${{ steps.target.outputs.branch_name }}
          DEFAULT_BRANCH: ${{ steps.target.outputs.default_branch }}
          PR_NUMBER: ${{ steps.target.outputs.pr_number }}
          SCHEMA_PATH: ${{ steps.context.outputs.schema_path }}
          TARGET_PATH: ${{ steps.context.outputs.target_path }}
          SOURCE_SHA: ${{ steps.context.outputs.source_sha }}
          SOURCE_REF: ${{ steps.context.outputs.source_ref }}
          SHA_SHORT: ${{ steps.context.outputs.sha_short }}
          SOURCE_REPO: ${{ github.repository }}
        with:
          github-token: ${{ env.SYNC_TOKEN }}
          script: |
            const [owner, repo] = process.env.TARGET_REPO.split("/");
            const title = `chore(schema): sync schema.json from catch-data@${process.env.SHA_SHORT}`;
            const body = [
              "## Schema sync",
              "",
              `This PR updates \`${process.env.TARGET_PATH}\` from \`${process.env.SCHEMA_PATH}\` in \`${process.env.SOURCE_REPO}\`.`,
              "",
              `- Source commit: [${process.env.SOURCE_REPO}@${process.env.SOURCE_SHA}](https://github.com/${process.env.SOURCE_REPO}/commit/${process.env.SOURCE_SHA})`,
              `- Source ref: \`${process.env.SOURCE_REF}\``,
            ].join("\n");

            if (process.env.PR_NUMBER && process.env.PR_NUMBER !== "") {
              core.info(`Updating existing schema sync PR #${process.env.PR_NUMBER}.`);
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: Number(process.env.PR_NUMBER),
                title,
                body,
              });
              return;
            }

            await github.rest.pulls.create({
              owner,
              repo,
              title,
              body,
              head: process.env.BRANCH_NAME,
              base: process.env.DEFAULT_BRANCH,
            });
