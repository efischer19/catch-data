site_name: "catch-data Documentation"
site_description: "Documentation for catch-data"
site_url: "https://efischer19.github.io/catch-data/"
docs_dir: docs-src

theme:
  name: material
  palette:
    primary: blue
    accent: orange
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight

plugins:
  - search

nav:
  - Home: index.md
  - Development:
      - Contributing: CONTRIBUTING.md
      - Development Philosophy: DEVELOPMENT_PHILOSOPHY.md
      - Local Development Dependencies: LOCAL_DEVELOPMENT_DEPENDENCIES.md
      - Feature Request Automation: FEATURE_REQUEST_AUTOMATION.md
  - Guides:
      - Medallion Architecture: MEDALLION_ARCHITECTURE.md
      - Pipeline Runbook: PIPELINE_RUNBOOK.md
      - Documentation Guide: DOCUMENTATION_README.md
      - Shared Library Versioning: SHARED_LIBRARY_VERSIONING.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/efischer19/catch-data"
